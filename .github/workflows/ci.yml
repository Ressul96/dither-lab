name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax-check all JS
        run: find src -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: ESM link check
        run: |
          node --input-type=module -e "import('./src/js/main.js').then(()=>{console.log('unexpected: evaluated fully');process.exit(0)}).catch(e=>{if(e instanceof ReferenceError){console.log('link OK (DOM error expected):',e.message);process.exit(0)}console.error(e.message);process.exit(1)})"
      - name: Unit tests
        run: npm test

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml
